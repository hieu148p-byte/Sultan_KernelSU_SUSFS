name: Sultan
permissions:
  contents: write # Allow writing to repository contents (for pushing tags)
  actions: write # Allows triggering actions

on:
  workflow_call: # This allows this workflow to be called from another workflow
    inputs:
      codename:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["wksu-susfs"]
    steps:
      - name: Maximize Build Space
        if: matrix.features == 'wksu-susfs'
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'          # Frees ~2 GB
          remove-android: 'true'         # Frees ~9 GB
          remove-haskell: 'true'         # Frees ~5.2 GB
          remove-codeql: 'true'          # Frees ~5.4 GB
          remove-docker-images: 'true'   # Frees ~3.2 GB
          remove-large-packages: 'true'  # Frees ~3.1 GB
          remove-swapfile: 'true'        # Frees ~4 GB
          remove-cached-tools: 'false'   # Avoid unless confirmed safe
          verbose: 'true'                # Enable detailed logging

      - name: Download and extract GCC 14.2.0 toolchain
        run: |
          echo "Downloading GCC 14.2.0 cross-compiler toolchain..."
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          echo "Extracting .gz file..."
          gunzip x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          echo "Extracting .tar file..."
          tar -xf x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar
          echo "GCC 14.2.0 toolchain extracted successfully"

      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="android_kernel_google_tensynos"

          # Set CONFIG as an environment variable for future steps
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

          echo "CONFIG set to: $CONFIG"

      - name: Clone AnyKernel3 and Other Dependencies
        run: |
          echo "Cloning AnyKernel3 and other dependencies..."

          ANYKERNEL_BRANCH="sultan-${{ inputs.codename }}"

          # Debug print the branches
          echo "Using branch for AnyKernel3: $ANYKERNEL_BRANCH"

          # Clone repositories using the branch names
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          git clone https://github.com/TheWildJames/kernel_patches.git
          # Pin tensynos to the r12-release commit (HEAD drifted: cmucal-debug
          # redefinition + sucompat -Werror). af5c65b9 = the proven-good build.
          # Shallow fetch THAT exact SHA (reliable; the prior clone+fetch silently
          # stayed on HEAD). Fails loudly if the checkout doesn't take.
          git init android_kernel_google_tensynos
          git -C android_kernel_google_tensynos remote add origin https://github.com/kerneltoast/android_kernel_google_tensynos
          git -C android_kernel_google_tensynos fetch --depth 1 origin af5c65b9547a9f33c5f566430d0434aecab5a8b5
          git -C android_kernel_google_tensynos checkout FETCH_HEAD
          echo "TENSYNOS PINNED TO $(git -C android_kernel_google_tensynos rev-parse HEAD)"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          cd susfs4ksu
          git checkout ef16cbce5c5195988b9b630de85466148cbbcdef

      - name: Add KernelSU
        if: contains(matrix.features, 'wksu')
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Adding KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s 293ca016cf7196c2e96403a929ea3f464fd3568b

      - name: Apply SUSFS Patches
        if: contains(matrix.features, 'susfs')
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          SUSFS_VERSION="2.0.0"

          echo "Applying SUSFS patches..."

          # Copy SUSFS patches
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          perl -0pi -e 's/if \(IS_ERR\(f\) && !libperfmgr_redirect\(&f, dfd, tmp, &op, how\)\) \{/if (IS_ERR(f)) {/g' fs/open.c

          # Change to common directory and apply SUSFS patch
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          perl -0pi -e 's/if \(IS_ERR\(f\)\) \{/if (IS_ERR(f) && !libperfmgr_redirect(&f, dfd, tmp, &op, how)) {/g' fs/open.c
          
          cp ../kernel_patches/sultan/sys.c_fix.patch ./
          patch -p1 < sys.c_fix.patch

          cd KernelSU-Next
          cp ${{ github.workspace }}/kernel_patches/wild/archived/ksun-293ca01-susfs-v2.1.0-a14-6.1-ef16cbce.patch ./
          patch -p1 < ksun-293ca01-susfs-v2.1.0-a14-6.1-ef16cbce.patch

      - name: TLSGhost - make KSU sucompat hook survive CONFIG_TRACING
        if: matrix.features == 'wksu-susfs'
        shell: bash
        run: |
          cd "$CONFIG/KernelSU-Next"
          SC=kernel/feature/sucompat.c
          # ROOT CAUSE (builds #5-#7): ksu_handle_execveat_ksud always returns 0, so the
          # dispatch ALWAYS falls through to ksu_handle_execveat_sucompat, which rewrites
          # filename->name to KSUD_PATH ("su found"). With CONFIG_TRACING on, the manual
          # hook's argv is wrong so ksud's check_argv("second_stage") fails to log/setup,
          # and sucompat mangles the FIRST-stage init's exec of /system/bin/init ->
          # execv ENOENT -> "Attempted to kill init" panic. boot_b never mangles init.
          # FIX: never su-mangle the /system/bin/init exec (match boot_b behaviour).
          perl -0pi -e 's{memcpy\(\(void \*\)filename->name, ksud_path, sizeof\(ksud_path\)\);}{if (!strncmp(filename->name, "/system/bin/init", 16)) return 0; /* TLSGhost: do not su-mangle init exec */\n\tmemcpy((void *)filename->name, ksud_path, sizeof(ksud_path));}' "$SC"
          if grep -q 'TLSGhost: do not su-mangle init exec' "$SC"; then
            echo "OK: sucompat init guard applied"
          else
            echo "::error::sucompat init guard did NOT apply (memcpy target not found — patch format changed)"; exit 1
          fi

      - name: Configure KernelSU
        if: contains(matrix.features, 'wksu')
        run: |
          cd "$CONFIG"
          # KernelSU Configuration
          echo "# KernelSU Configuration" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          if [[ "${{ matrix.features }}" == *"susfs"* ]]; then
            echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          else
            echo "CONFIG_KSU_MANUAL_HOOKS=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
            echo "CONFIG_KSU_SUSFS=n" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
            cp ../kernel_patches/wild/hooks/69_pure_manual_hooks_only.patch ./
            patch -p1 < 69_pure_manual_hooks_only.patch
          fi

      - name: Configure Mountify Support
        if: matrix.features == 'wksu-susfs'
        run: |
          cd "$CONFIG"
          # Mountify Support
          echo "# Mountify Support" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Install BTF build deps (pahole + libelf/zlib for resolve_btfids)
        if: matrix.features == 'wksu-susfs'
        # CONFIG_DEBUG_INFO_BTF builds the host tool tools/bpf/resolve_btfids, which
        # #includes <libelf.h> and links libelf+zlib. dwarves alone is not enough
        # (the Maximize-Build-Space step can also strip pre-installed -dev headers).
        run: sudo apt-get update && sudo apt-get install -y dwarves libelf-dev zlib1g-dev

      - name: Configure TLSGhost Build-T tracing (BTF + uprobe + ftrace)
        shell: bash
        if: matrix.features == 'wksu-susfs'
        run: |
          cd "$CONFIG"
          cat >> "./arch/arm64/configs/${{ inputs.codename }}_defconfig" << 'EOF'
          # --- TLSGhost Build-T: userspace-uprobe kernel for RASP analysis ---
          # GOAL = uprobe libverimatrix by file-offset via tracefs. That needs ONLY
          # FTRACE (the master menuconfig, so UPROBE_EVENTS under `if FTRACE` is settable)
          # + UPROBES + UPROBE_EVENTS (which select TRACING -> obj-$(CONFIG_TRACING) tracefs).
          # WERROR off = the sucompat -Werror fix.
          CONFIG_WERROR=n
          CONFIG_FTRACE=y
          CONFIG_TRACING=y
          CONFIG_UPROBES=y
          CONFIG_UPROBE_EVENTS=y
          # KPROBES deliberately OFF (build #7): build #6 (FTRACE+UPROBE+KPROBES) booted
          # the kernel but PANICKED at the first->second-stage init handoff
          # (execv("/system/bin/init")=ENOENT, right after ksu_handle_execveat_sucompat).
          # Hypothesis: with CONFIG_KPROBES available, KSU-Next installs kprobe-based
          # syscall hooks ON TOP OF the susfs manual hooks -> double execve handling.
          # uprobe is independent of kprobe, so dropping KPROBES keeps the goal intact.
          # DELIBERATELY NOT SET (each breaks the vmlinux link with the GCC 14.2 cross
          # toolchain, which this GKI/Clang kernel was never meant to use, and NONE are
          # needed for userspace uprobe-by-offset):
          #   - FUNCTION_TRACER / DYNAMIC_FTRACE -> MCOUNT_REC() references an undefined
          #     arm64 symbol arch_ftrace_ops_list_func (build #3).
          #   - DEBUG_INFO_BTF (+ its DWARF) -> BTF_ID_LIST weak symbols emit adrp
          #     R_AARCH64_ADR_PREL_PG_HI21 relocations rejected in the PIE/KASLR kernel:
          #     "dangerous relocation: unsupported relocation" against bpf_*_btf_id /
          #     btf_*_id (build #4). BTF is only for eBPF CO-RE, NOT for uprobe (see
          #     PROGRESS #10 "uprobe-by-offset does NOT need BTF"). If eBPF is ever
          #     needed, that route is a separate Clang-toolchain build.
          EOF

      - name: Configure Networking
        if: false
        run: |
          cd "$CONFIG"
          # Networking Configuration
          echo "# Networking Configuration" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP6_NF_MATCH_HL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Add IP SET & IPv6_NAT Support
        shell: bash
        if: false
        run: |
          cd "$CONFIG"
          cat >> "./arch/arm64/configs/${{ inputs.codename }}_defconfig" << 'EOF'
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF

      - name: Apply TCP Congestion Control
        shell: bash
        if: false
        run: |
          cd "$CONFIG"
          cat >> "./arch/arm64/configs/${{ inputs.codename }}_defconfig" << 'EOF'
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=y
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          EOF

      - name: Run sed and perl Commands
        if: matrix.features == 'wksu-susfs'
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Running sed commands..."
          # Keep LOCALVERSION EXACTLY "-Sultan-Wild" (the value the prior trace kernel booted
          # with). A "-Sultan-Wild-T" marker (build #5) changed UTS_RELEASE and the device
          # then panicked at the first->second-stage handoff: execv("/system/bin/init")
          # ENOENT (init exit 127). The early dmesg banner's build timestamp already
          # distinguishes our kernel from the stock boot_b, so no version marker is needed.
          sed -i 's/CONFIG_LOCALVERSION="-Sultan"/CONFIG_LOCALVERSION="-Sultan-Wild"/' ./arch/arm64/configs/${{ inputs.codename }}_defconfig

          sed -i '/echo "+"$/d' scripts/setlocalversion


      - name: Build the Kernel
        shell: bash
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          GCCBIN=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin
          MK="make CROSS_COMPILE=$GCCBIN/aarch64-linux- CC=$GCCBIN/aarch64-linux-gcc"

          # 1) Base .config from the tracing-augmented defconfig
          $MK -j$(nproc --all) ${{ inputs.codename }}_defconfig

          # 2) Locate .config (this kernel builds with an implicit O=out)
          KCONF=out/.config
          [ -f "$KCONF" ] || KCONF=.config
          [ -f "$KCONF" ] || KCONF=$(find . -maxdepth 4 -name .config | head -1)
          echo "Using .config at: $KCONF"

          # 3) AUTHORITATIVE force-enable: scripts/config rewrites the symbol lines,
          #    olddefconfig then re-resolves dependencies. This is order-independent and
          #    survives the `if FTRACE` gate + the exclusive DWARF choice that a raw
          #    defconfig-append cannot (belt to the fragment's suspenders above).
          bash ./scripts/config --file "$KCONF" \
            -d WERROR \
            -e FTRACE \
            -d FUNCTION_TRACER -d DYNAMIC_FTRACE -d FTRACE_SYSCALLS \
            -d FUNCTION_GRAPH_TRACER -d FTRACE_MCOUNT_RECORD \
            -d KPROBES -d KPROBE_EVENTS -e UPROBES -e UPROBE_EVENTS \
            -d DEBUG_INFO_BTF -d DEBUG_INFO_BTF_MODULES
          $MK olddefconfig

          # 4) VERIFY-OR-FAIL *before* the ~20-min build. A wrong config now costs 2 min
          #    in the CI log instead of a full build + repack + fastboot + reboot cycle.
          echo "===== tracing/BTF-relevant final .config ====="
          grep -E 'FTRACE|TRACING|UPROBE|KPROBE|DEBUG_INFO|BTF|BPF_|DEBUG_KERNEL|DWARF|LOCALVERSION' "$KCONF" | sort || true
          echo "=============================================="
          # REQUIRED (gate): the userspace-uprobe goal. tracefs needs CONFIG_TRACING,
          # which UPROBE_EVENTS select's under `if FTRACE`.
          FAIL=0
          for s in CONFIG_FTRACE CONFIG_TRACING \
                   CONFIG_UPROBES CONFIG_UPROBE_EVENTS; do
            if grep -q "^$s=y" "$KCONF"; then echo "OK   $s=y"; else echo "FAIL $s NOT =y"; FAIL=1; fi
          done
          # MUST be OFF: each breaks the vmlinux link with this GCC cross-toolchain.
          #   FUNCTION_TRACER/DYNAMIC_FTRACE -> undefined arch_ftrace_ops_list_func (build #3)
          #   DEBUG_INFO_BTF -> BTF_ID weak-symbol adrp relocations in the PIE kernel (build #4)
          for s in CONFIG_FUNCTION_TRACER CONFIG_DYNAMIC_FTRACE CONFIG_FTRACE_MCOUNT_RECORD \
                   CONFIG_DEBUG_INFO_BTF; do
            if grep -q "^$s=y" "$KCONF"; then echo "FAIL $s is =y (must be OFF — breaks vmlinux link)"; FAIL=1; else echo "OK   $s off"; fi
          done
          for s in CONFIG_KPROBE_EVENTS; do
            grep -q "^$s=y" "$KCONF" && echo "okk  $s=y (best-effort)" || echo "warn $s not =y (best-effort, non-fatal)"
          done
          if [ "$FAIL" != "0" ]; then
            echo "::error::Required tracing/BTF configs did not land in .config — aborting before the long build."
            exit 1
          fi

          # 5) Build
          $MK LOCALVERSION_AUTO=0 -j$(nproc --all)

          # Capture the REAL resolved .config as ground truth (the in-kernel IKCONFIG
          # snapshot is stale on this Sultan build — it claims TRACING=y on a kernel that
          # has no tracefs at runtime, so extract-ikconfig cannot be trusted).
          cp "$KCONF" "$GITHUB_WORKSPACE/built-real.config" || true

      - name: Upload real .config
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: builtconfig-${{ inputs.codename }}-${{ matrix.features }}
          path: built-real.config

      - name: Copy Images
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Copying Image.lz4 and concatenating DTB files..."
          cp ./out/arch/arm64/boot/Image.lz4 ../AnyKernel3/Image.lz4
          if [ "${{ inputs.codename }}" == "gs201" ]; then
            cat ./out/google-devices/gs201/dts/*.dtb > ../AnyKernel3/dtb
            #cp ./out/google-devices/gs201/dts/dtbo.img ../AnyKernel3/dtbo.img
          elif [ "${{ inputs.codename }}" == "zuma" ]; then
            cat ./out/google-devices/zuma/dts/*.dtb > ../AnyKernel3/dtb
          elif [ "${{ inputs.codename }}" == "zumapro" ]; then
            cat ./out/google-devices/zumapro/dts/*.dtb > ../AnyKernel3/dtb
          fi

      - name: Create ZIP Files for Different Formats
        run: |
          echo "Navigating to AnyKernel3 directory..."
          cd ./AnyKernel3

          # Zip the files in the AnyKernel3 directory with a new naming convention
          ZIP_NAME="${{ inputs.codename }}-a16-${{ matrix.features }}-anykernel3.zip"
          echo "Creating zip file $ZIP_NAME..."
          zip -r "../$ZIP_NAME" ./*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.codename }}-${{ matrix.features }}
          path: |
            *.zip

      - name: Collect .rej files
        if: ${{ always() }}
        id: collect_rej
        shell: bash
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          rm -rf rej
          mkdir -p rej

          found="false"
          while IFS= read -r -d '' rej_file; do
            found="true"
            original_file="${rej_file%.rej}"
            rej_rel="${rej_file#./}"
            original_rel="${original_file#./}"

            mkdir -p "rej/$(dirname "$rej_rel")"
            cp -f "$rej_file" "rej/$rej_rel"

            if [[ -f "$original_file" ]]; then
              mkdir -p "rej/$(dirname "$original_rel")"
              cp -f "$original_file" "rej/$original_rel"
            fi
          done < <(find . -type f -name '*.rej' -print0)

          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Zip collected .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          zip -r "rej-${{ inputs.codename }}-${{ matrix.features }}.zip" rej

      - name: Upload .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rej-${{ inputs.codename }}-${{ matrix.features }}
          path: |
            rej-${{ inputs.codename }}-${{ matrix.features }}.zip
