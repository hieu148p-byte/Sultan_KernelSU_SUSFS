name: Build and Release Sultan Kernels

permissions:
  contents: write  # Allow writing to repository contents (for pushing tags)
  actions: write   # Allows triggering actions

on:
  workflow_dispatch:

jobs:
  # TLSGhost Build-T: only gs201 (Pixel 7 Pro / cheetah). zuma/zumapro builds + the
  # trigger-release job were removed — we just download the gs201 wksu-susfs artifact.
  build-kernel-gs201:
    uses: ./.github/workflows/sultan.yml
    secrets: inherit
    with:
      codename: "gs201"
      android_version: "android14"
      kernel_version: "6.1"
